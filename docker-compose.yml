version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: openagent
      POSTGRES_USER: openagent
      POSTGRES_PASSWORD: openagent
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgresql://openagent:openagent@db:5432/openagent?schema=public
      PORT: 3001
    depends_on:
      - db
    ports:
      - "3001:3001"

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres-data: